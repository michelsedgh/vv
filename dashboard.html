<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice ID — Live Diarization</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { background: #0f172a; color: #e2e8f0; font-family: 'Inter', system-ui, sans-serif; }
  .speaker-lane { transition: all 0.3s ease; }
  .speaker-lane.active { box-shadow: 0 0 20px rgba(34, 197, 94, 0.3); }
  .glow-dot { width: 10px; height: 10px; border-radius: 50%; }
  .glow-dot.on { background: #22c55e; box-shadow: 0 0 8px #22c55e; }
  .glow-dot.off { background: #475569; }
  canvas.waveform { image-rendering: pixelated; }
  #event-log { max-height: 200px; overflow-y: auto; font-size: 0.75rem; }
  #event-log::-webkit-scrollbar { width: 4px; }
  #event-log::-webkit-scrollbar-thumb { background: #475569; border-radius: 2px; }
  .avatar { width: 40px; height: 40px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; font-weight: 700;
            font-size: 1rem; flex-shrink: 0; }
</style>
</head>
<body class="min-h-screen p-4">

<!-- Header -->
<div class="max-w-5xl mx-auto">
  <div class="flex items-center justify-between mb-6">
    <div>
      <h1 class="text-2xl font-bold text-white">Voice ID</h1>
      <p class="text-sm text-slate-400">Real-Time Diarization &amp; Separation</p>
    </div>
    <div class="flex items-center gap-3">
      <div id="stats" class="text-xs text-slate-500 text-right">
        <div>Step: <span id="stat-step">0</span></div>
        <div>Infer: <span id="stat-infer">—</span> ms</div>
      </div>
      <button id="btn-start" onclick="toggleMonitor()"
              class="px-4 py-2 rounded-lg font-semibold text-sm bg-emerald-600 hover:bg-emerald-500 text-white transition">
        Start
      </button>
    </div>
  </div>

  <!-- Speaker Lanes -->
  <div id="speaker-lanes" class="space-y-2 mb-6">
    <div class="text-slate-500 text-sm italic" id="no-speakers-msg">
      No speakers detected yet. Click Start to begin.
    </div>
  </div>

  <!-- Bottom panels -->
  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

    <!-- Enrollment Panel -->
    <div class="bg-slate-800/50 rounded-xl p-4 border border-slate-700">
      <h2 class="text-sm font-semibold text-slate-300 mb-3">Enroll Speaker</h2>
      <div class="flex gap-2 mb-3">
        <input id="enroll-name" type="text" placeholder="Speaker name"
               class="flex-1 bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-emerald-500">
        <input id="enroll-duration" type="number" value="10" min="3" max="30"
               class="w-16 bg-slate-900 border border-slate-600 rounded-lg px-2 py-2 text-sm text-white text-center focus:outline-none focus:border-emerald-500">
        <button onclick="enrollSpeaker()" id="btn-enroll"
                class="px-4 py-2 rounded-lg font-semibold text-sm bg-blue-600 hover:bg-blue-500 text-white transition">
          Record
        </button>
      </div>
      <div id="enroll-status" class="text-xs text-slate-400"></div>

      <!-- Enrolled speakers list -->
      <div id="enrolled-list" class="mt-3 space-y-1"></div>
    </div>

    <!-- Event Log -->
    <div class="bg-slate-800/50 rounded-xl p-4 border border-slate-700">
      <h2 class="text-sm font-semibold text-slate-300 mb-3">Event Log</h2>
      <div id="event-log" class="space-y-1 text-slate-400"></div>
    </div>
  </div>

  <!-- Diagnostic Recording Panel -->
  <div class="mt-4 bg-slate-800/50 rounded-xl p-4 border border-amber-700/50">
    <h2 class="text-sm font-semibold text-amber-400 mb-3">Diagnostic Recordings</h2>
    <p class="text-xs text-slate-400 mb-3">Record labeled 5s clips for offline analysis. Stop the monitor first.</p>
    <div class="flex gap-2 mb-3">
      <input id="diag-label" type="text" placeholder="Label (e.g. mich, cousin, tv)"
             class="flex-1 bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-sm text-white placeholder-slate-500 focus:outline-none focus:border-amber-500">
      <input id="diag-duration" type="number" value="5" min="2" max="15"
             class="w-16 bg-slate-900 border border-slate-600 rounded-lg px-2 py-2 text-sm text-white text-center focus:outline-none focus:border-amber-500">
      <span class="text-xs text-slate-500 self-center">sec</span>
      <button onclick="diagRecord()" id="btn-diag"
              class="px-4 py-2 rounded-lg font-semibold text-sm bg-amber-600 hover:bg-amber-500 text-white transition">
        Record
      </button>
    </div>
    <div id="diag-status" class="text-xs text-slate-400 mb-3"></div>
    <div id="diag-clips" class="space-y-1 max-h-40 overflow-y-auto"></div>
  </div>
</div>

<script>
// ─── State ───────────────────────────────────────────────────────
let ws = null;
let isRunning = false;
let audioCtx = null;
const speakerLanes = {};  // global_id -> { element, canvas, canvasCtx, gainNode, waveformData, ... }

const COLORS = [
  '#ef4444', '#3b82f6', '#22c55e', '#f59e0b', '#8b5cf6',
  '#ec4899', '#14b8a6', '#f97316'
];

// ─── WebSocket ───────────────────────────────────────────────────
let wsPingTimer = null;

function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws/live`);

  ws.onopen = () => {
    logEvent('WebSocket connected');
    // Send keepalive ping every 15s
    if (wsPingTimer) clearInterval(wsPingTimer);
    wsPingTimer = setInterval(() => {
      if (ws && ws.readyState === WebSocket.OPEN) ws.send('ping');
    }, 15000);
  };

  ws.onclose = (e) => {
    if (wsPingTimer) { clearInterval(wsPingTimer); wsPingTimer = null; }
    logEvent('WebSocket closed (code ' + e.code + ')');
    setTimeout(connectWS, 3000);
  };

  ws.onerror = (e) => {
    logEvent('WebSocket error', true);
  };

  ws.onmessage = (e) => {
    try { handleMessage(JSON.parse(e.data)); }
    catch (err) { console.error('WS parse error:', err); }
  };
}

function handleMessage(msg) {
  if (msg.type === 'diarization') {
    document.getElementById('stat-step').textContent = msg.step;
    document.getElementById('stat-infer').textContent = msg.infer_ms;

    // Update or create speaker lanes
    const activeIds = new Set();
    for (const sp of msg.speakers) {
      activeIds.add(sp.id);
      updateSpeakerLane(sp, msg.sample_rate, msg.samples);
    }
    // Mark inactive lanes
    for (const [id, lane] of Object.entries(speakerLanes)) {
      if (!activeIds.has(parseInt(id))) {
        lane.element.classList.remove('active');
        lane.element.querySelector('.glow-dot').classList.remove('on');
        lane.element.querySelector('.glow-dot').classList.add('off');
      }
    }
    // Hide placeholder
    const placeholder = document.getElementById('no-speakers-msg');
    if (msg.speakers.length > 0 && placeholder) placeholder.style.display = 'none';

  } else if (msg.type === 'status') {
    logEvent(msg.message);
  } else if (msg.type === 'error') {
    logEvent('ERROR: ' + msg.message, true);
  } else if (msg.type === 'diag') {
    document.getElementById('diag-status').textContent = msg.message || '';
    if (msg.status === 'done') {
      document.getElementById('btn-diag').disabled = false;
      loadDiagClips();
    } else if (msg.status === 'error') {
      document.getElementById('btn-diag').disabled = false;
    }
  } else if (msg.type === 'enrollment') {
    document.getElementById('enroll-status').textContent = msg.message || msg.status;
    if (msg.status === 'done' || msg.status === 'error') {
      document.getElementById('btn-enroll').disabled = false;
      loadSpeakers();
    }
  }
}

// ─── Speaker Lanes ───────────────────────────────────────────────
function createSpeakerLane(sp) {
  const id = sp.id;
  const color = COLORS[id % COLORS.length];
  const initial = sp.label.charAt(0).toUpperCase();

  const div = document.createElement('div');
  div.className = 'speaker-lane bg-slate-800/70 rounded-xl p-3 border border-slate-700 flex items-center gap-3';
  div.id = `lane-${id}`;
  div.innerHTML = `
    <div class="glow-dot off"></div>
    <div class="avatar" style="background:${color}30; color:${color}; border: 2px solid ${color}">${initial}</div>
    <div class="flex-1 min-w-0">
      <div class="flex items-center gap-2 mb-1">
        <span class="font-semibold text-sm text-white truncate">${sp.label}</span>
        ${sp.enrolled ? '<span class="text-[10px] px-1.5 py-0.5 rounded bg-emerald-900 text-emerald-400">enrolled</span>' : '<span class="text-[10px] px-1.5 py-0.5 rounded bg-slate-700 text-slate-400">unknown</span>'}
        <span class="activity-pct text-[10px] text-slate-500 ml-auto">0%</span>
      </div>
      <canvas class="waveform w-full rounded" height="40" style="background:#1e293b"></canvas>
    </div>
    <div class="flex flex-col items-center gap-1" style="min-width:60px">
      <input type="range" min="0" max="100" value="80" class="vol-slider w-14 h-1 accent-slate-400"
             oninput="setVolume(${id}, this.value)">
      <button class="text-[10px] text-slate-500 hover:text-white mute-btn" onclick="toggleMute(${id})">mute</button>
    </div>
  `;

  document.getElementById('speaker-lanes').appendChild(div);

  const canvas = div.querySelector('canvas.waveform');
  canvas.width = canvas.offsetWidth * 2 || 600;
  canvas.height = 80;
  const canvasCtx = canvas.getContext('2d');

  // Audio playback node
  let gainNode = null;
  if (audioCtx) {
    gainNode = audioCtx.createGain();
    gainNode.gain.value = 0.8;
    gainNode.connect(audioCtx.destination);
  }

  speakerLanes[id] = {
    element: div,
    canvas: canvas,
    canvasCtx: canvasCtx,
    gainNode: gainNode,
    color: color,
    waveformBuf: new Float32Array(0),
    muted: false,
  };

  return speakerLanes[id];
}

function updateSpeakerLane(sp, sampleRate, numSamples) {
  let lane = speakerLanes[sp.id];
  if (!lane) {
    lane = createSpeakerLane(sp);
  }

  // Active state
  const isActive = sp.active;
  if (isActive) {
    lane.element.classList.add('active');
    lane.element.querySelector('.glow-dot').classList.add('on');
    lane.element.querySelector('.glow-dot').classList.remove('off');
  } else {
    lane.element.classList.remove('active');
    lane.element.querySelector('.glow-dot').classList.remove('on');
    lane.element.querySelector('.glow-dot').classList.add('off');
  }

  // Activity percentage
  lane.element.querySelector('.activity-pct').textContent = Math.round(sp.activity * 100) + '%';

  // Decode audio
  if (sp.audio && sp.audio.length > 0) {
    const raw = atob(sp.audio);
    const i16 = new Int16Array(new Uint8Array([...raw].map(c => c.charCodeAt(0))).buffer);
    const f32 = new Float32Array(i16.length);
    for (let i = 0; i < i16.length; i++) f32[i] = i16[i] / 32768;

    // Append to waveform buffer (keep last ~3s)
    const maxSamples = sampleRate * 3;
    const combined = new Float32Array(lane.waveformBuf.length + f32.length);
    combined.set(lane.waveformBuf);
    combined.set(f32, lane.waveformBuf.length);
    lane.waveformBuf = combined.length > maxSamples
      ? combined.slice(combined.length - maxSamples)
      : combined;

    // Draw waveform
    drawWaveform(lane);

    // Play audio
    if (audioCtx && lane.gainNode && !lane.muted && isActive) {
      playAudio(f32, sampleRate, lane.gainNode);
    }
  }
}

function drawWaveform(lane) {
  const ctx = lane.canvasCtx;
  const w = lane.canvas.width;
  const h = lane.canvas.height;
  const data = lane.waveformBuf;

  ctx.fillStyle = '#1e293b';
  ctx.fillRect(0, 0, w, h);

  if (data.length === 0) return;

  ctx.strokeStyle = lane.color;
  ctx.lineWidth = 1.5;
  ctx.beginPath();

  const step = Math.max(1, Math.floor(data.length / w));
  const mid = h / 2;
  for (let x = 0; x < w; x++) {
    const idx = Math.floor(x * data.length / w);
    let min = 1, max = -1;
    for (let j = 0; j < step && idx + j < data.length; j++) {
      const v = data[idx + j];
      if (v < min) min = v;
      if (v > max) max = v;
    }
    const y1 = mid + min * mid * 0.9;
    const y2 = mid + max * mid * 0.9;
    ctx.moveTo(x, y1);
    ctx.lineTo(x, y2);
  }
  ctx.stroke();
}

function playAudio(f32, sampleRate, gainNode) {
  if (!audioCtx) return;
  const buf = audioCtx.createBuffer(1, f32.length, sampleRate);
  buf.getChannelData(0).set(f32);
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  src.connect(gainNode);
  src.start();
}

function setVolume(id, val) {
  const lane = speakerLanes[id];
  if (lane && lane.gainNode) {
    lane.gainNode.gain.value = val / 100;
  }
}

function toggleMute(id) {
  const lane = speakerLanes[id];
  if (!lane) return;
  lane.muted = !lane.muted;
  const btn = lane.element.querySelector('.mute-btn');
  btn.textContent = lane.muted ? 'unmute' : 'mute';
  btn.classList.toggle('text-red-400', lane.muted);
  if (lane.gainNode) {
    lane.gainNode.gain.value = lane.muted ? 0 : (lane.element.querySelector('.vol-slider').value / 100);
  }
}

// ─── Controls ────────────────────────────────────────────────────
async function toggleMonitor() {
  const btn = document.getElementById('btn-start');
  if (!isRunning) {
    // Init AudioContext on user gesture
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
    }
    try {
      const resp = await fetch('/api/start', { method: 'POST' });
      if (resp.ok) {
        isRunning = true;
        btn.textContent = 'Stop';
        btn.classList.remove('bg-emerald-600', 'hover:bg-emerald-500');
        btn.classList.add('bg-red-600', 'hover:bg-red-500');
      }
    } catch (e) { logEvent('Start failed: ' + e, true); }
  } else {
    try {
      await fetch('/api/stop', { method: 'POST' });
      isRunning = false;
      btn.textContent = 'Start';
      btn.classList.remove('bg-red-600', 'hover:bg-red-500');
      btn.classList.add('bg-emerald-600', 'hover:bg-emerald-500');
    } catch (e) { logEvent('Stop failed: ' + e, true); }
  }
}

async function enrollSpeaker() {
  const name = document.getElementById('enroll-name').value.trim();
  const duration = parseInt(document.getElementById('enroll-duration').value);
  if (!name) { alert('Enter a speaker name'); return; }

  document.getElementById('btn-enroll').disabled = true;
  document.getElementById('enroll-status').textContent = 'Starting enrollment...';

  try {
    const resp = await fetch('/api/enroll', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, duration }),
    });
    if (!resp.ok) {
      const err = await resp.json();
      document.getElementById('enroll-status').textContent = err.detail || 'Error';
      document.getElementById('btn-enroll').disabled = false;
    }
  } catch (e) {
    document.getElementById('enroll-status').textContent = 'Request failed: ' + e;
    document.getElementById('btn-enroll').disabled = false;
  }
}

async function loadSpeakers() {
  try {
    const resp = await fetch('/api/speakers');
    const speakers = await resp.json();
    const list = document.getElementById('enrolled-list');
    list.innerHTML = '';
    for (const sp of speakers) {
      const div = document.createElement('div');
      div.className = 'flex items-center justify-between text-xs py-1 px-2 rounded bg-slate-900/50';
      div.innerHTML = `
        <span class="text-slate-300">${sp.name}</span>
        <div class="flex items-center gap-2">
          ${sp.has_embedding ? '<span class="text-emerald-400">✓ emb</span>' : '<span class="text-slate-500">no emb</span>'}
          <button onclick="deleteSpeaker('${sp.name}')" class="text-red-400 hover:text-red-300">×</button>
        </div>`;
      list.appendChild(div);
    }
  } catch (e) {}
}

async function deleteSpeaker(name) {
  if (!confirm(`Delete speaker "${name}"?`)) return;
  await fetch(`/api/speakers/${name}`, { method: 'DELETE' });
  loadSpeakers();
}

// ─── Event log ───────────────────────────────────────────────────
function logEvent(msg, isError = false) {
  const log = document.getElementById('event-log');
  const div = document.createElement('div');
  const time = new Date().toLocaleTimeString();
  div.className = isError ? 'text-red-400' : 'text-slate-400';
  div.textContent = `[${time}] ${msg}`;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

// ─── Diagnostic Recording ─────────────────────────────────────
async function diagRecord() {
  const label = document.getElementById('diag-label').value.trim();
  const duration = parseInt(document.getElementById('diag-duration').value);
  if (!label) { alert('Enter a label for this clip'); return; }

  document.getElementById('btn-diag').disabled = true;
  document.getElementById('diag-status').textContent = `Recording "${label}" for ${duration}s...`;

  try {
    const resp = await fetch('/api/diag/record', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ label, duration }),
    });
    if (!resp.ok) {
      const err = await resp.json();
      document.getElementById('diag-status').textContent = err.detail || 'Error';
      document.getElementById('btn-diag').disabled = false;
    }
  } catch (e) {
    document.getElementById('diag-status').textContent = 'Request failed: ' + e;
    document.getElementById('btn-diag').disabled = false;
  }
}

async function loadDiagClips() {
  try {
    const resp = await fetch('/api/diag/clips');
    const clips = await resp.json();
    const list = document.getElementById('diag-clips');
    list.innerHTML = '';
    for (const clip of clips) {
      const div = document.createElement('div');
      div.className = 'flex items-center justify-between text-xs py-1 px-2 rounded bg-slate-900/50';
      const sizeKB = (clip.size / 1024).toFixed(1);
      div.innerHTML = `<span class="text-amber-300 truncate">${clip.name}</span>
        <span class="text-slate-500">${sizeKB} KB</span>`;
      list.appendChild(div);
    }
    if (clips.length === 0) {
      list.innerHTML = '<div class="text-xs text-slate-500 italic">No clips yet</div>';
    }
  } catch (e) {}
}

// ─── Init ────────────────────────────────────────────────────
window.addEventListener('load', () => {
  connectWS();
  loadSpeakers();
  loadDiagClips();
});
</script>
</body>
</html>
