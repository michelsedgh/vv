# ─── Voice ID: Real-Time Diarization & Separation ─────────────────
#
debug:
  # Optional STEP_PERF line (log.info) every 6 steps or when infer_ms > 300 ms.
  step_perf_log: true
  step_perf_every_step: true
  step_perf_spike_threshold_ms: 340.0
  step_perf_reset_on_init: true
  step_perf_ndjson: logs/infer_step_perf.ndjson
  capture_live_session: true
  live_capture_dir: logs/live_sessions
# Stack: [optional mic DF] → PixIT (5 s chunk, 0.5 s step) → WeSpeaker on
# mixed waveform + segmentation weights → EnrolledSpeakerClustering →
# global separated-source reconstruction → delayed per-speaker output slice
# → dashboard websocket transport / packet-step scheduling → browser playback.
#
# History-backed rules from debugging this repo:
#   • Do not reintroduce variable-length per-source embedding crops for live ID.
#     That was the main infer-ms regression that pushed runtime from ~240 ms
#     toward ~480+ ms.
#   • Do not treat raw current-window PixIT locals as perfectly stable live
#     speaker streams. They are useful for output/diagnostics, but direct
#     playback caused weak onsets, leakage, and chopped words.
#   • If audio sounds chopped in 500 ms windows while visuals look OK, first
#     suspect latency alignment between emitted audio, emitted activity mask, and
#     the browser scheduler before changing model thresholds.
# 
# Smooth playback / fewer spectrogram holes (tune in this order):
#   • audio.output_latency_sec — must be > step if you want the emitted slice to
#     be covered by more than one PixIT window. 1.0 s is the minimum useful
#     value here; 0.5 s falls back to the unstable newest edge again.
#   • clustering.tau_active — lower ⇒ more “active” locals ⇒ fewer empty maps;
#     too low adds noise; ~0.28 was a good tradeoff vs 0.4.
#   • clustering.delta_enrolled — persistent enrolled match threshold.
#   • clustering.leakage_delta — suppress duplicate PixIT locals that are still
#     close to an already matched enrolled speaker.
#   • denoiser.enhance_enrolled_output — default false; true can add 500 ms
#     block pumping on separated playback.
#   • pixit.aggregation_latency_sec — Hamming fusion of diarization frames for
#     activity smoothing (not waveform OA); must be >= step.
#
# Implementation details and log-backed root-cause notes: pipeline.py module
# docstring; clustering behavior: enrolled_clustering.py module docstring.

audio:
  device_index: 0          # sounddevice input device (IC800 USB mic)
  sample_rate: 16000       # PixIT native sample rate
  # Emit audio with a small delay so the packet comes from a better-supported
  # region of the latest PixIT chunk without adding a very noticeable lag.
  output_latency_sec: 1.0
  # Live enrolled playback uses delayed mixed audio gated by the assigned
  # speaker track, not raw separated PixIT locals. This is the causally stable
  # path; raw separated locals are only for emitted audio after assignment.
  # Important: the gate that controls this path must be aggregated with the
  # SAME latency as ``output_latency_sec``. Using the slower 2.0 s UI smoother
  # here created the "good window / bad window" chopping bug.
  enrolled_live_mix: false
  enrolled_mix_gate_threshold: 0.05
  enrolled_mix_gate_collar_sec: 0.10
  # Onset fallback only applies when an enrolled speaker is recognized one
  # step later than the delayed packet being emitted. Keep it slightly more
  # permissive than the steady-state live-mix gate to avoid clipped first
  # syllables without opening the lane all the time.
  enrolled_onset_gate_threshold: 0.01
  enrolled_onset_gate_collar_sec: 0.30
  # Approximate pyannote SpeechSeparation leakage-removal on emitted separated
  # packets: zero audio when the aligned speaker track is inactive. This does
  # not denoise speech while the speaker is active; it just removes clearly
  # inactive bleed between/around turns.
  separated_leakage_removal: true
  # Separated-output cleanup should be softer than the enrolled live-mix gate.
  # Too-high values here can punch holes into syllables on separated playback.
  separated_gate_threshold: 0.01
  separated_leakage_collar_sec: 0.10
  # Verification gates: enrolled audio is only emitted when both identity
  # similarity and activity exceed these thresholds. This prevents false-
  # positive enrolled audio when clustering makes a marginal distance match.
  enrolled_min_similarity: 0.25
  enrolled_min_activity: 0.10
  enrolled_onset_min_activity: 0.02

device: cuda               # torch device

enrollment:
  dir: enrolled_speakers   # each sub-dir has embedding.npy + reference.wav
  record_seconds: 30       # default recording duration for enrollment; longer refs help the profile bank more than inflating top_k on a short clip
  # Distance / room: enrollment saves reference.wav; on server start the pipeline
  # re-extracts your centroid via the same overlap-aware embedding path as live.
  # If you enroll nose-to-mic but use the app from across the room, the same
  # voice will still move in embedding space (level, reverb, room response) and
  # lower "ID %" on the dashboard while "diar %" still tracks how loud PixIT
  # marks the slot. Fix: re-enroll at your usual
  # seating distance (or mid-room), speak naturally for ~10s, restart the server.
  # Optional: record a second take from another position and we can add multi-anchor
  # enrollment later; for now one good far-field reference beats one near-field clip.

pixit:
  model: pyannote/separation-ami-1.0
  duration: 5.0            # chunk duration in seconds (model trained on 5s)
  step: 0.5                # step between chunks in seconds
  max_speakers: 3          # PixIT max output sources per chunk
  # DIART-style Hamming aggregation of permuted diarization (see diart SpeakerDiarization.pred_aggregation).
  # Must be >= step. 2.0 s ≈ four 0.5 s windows — smoother activity; set equal to step to disable.
  aggregation_latency_sec: 2.0

embedding:
  # Supported live backends in this repo:
  #   pyannote/wespeaker-voxceleb-resnet34-LM
  #   nvidia/speakerverification_en_titanet_large
  model: pyannote/wespeaker-voxceleb-resnet34-LM
  # Identity uses diart's official mixed-waveform + segmentation-weight path
  # for both enrollment rebuilds and live matching. The recent window keeps
  # stale silence in the 5 s buffer from dominating identity decisions.
  source_seg_threshold: 0.14
  source_min_voiced_sec: 0.10
  source_recent_sec: 2.0
  # Keep this conservative unless reference.wav is much longer. Replays with the
  # current 10 s enrollment regressed when we inflated the bank aggressively.
  enrollment_profile_top_k: 3
  enrollment_scan_step_sec: 0.5
  enrollment_min_voiced_sec: 0.40
  gamma: 3.0
  beta: 10.0

clustering:
  # Core knobs that actually matter in day-to-day tuning:
  #   tau_active      — local speaker must be this active to participate
  #   delta_enrolled  — strict enrolled match distance
  #   delta_new       — how easily unmatched locals become/reuse unknowns
  #   leakage_delta   — suppress duplicate PixIT leakage locals near an
  #                     already matched enrolled speaker
  # Usually leave rho_update and max_speakers alone unless logs show why.
  tau_active: 0.28        # practical range ~0.22–0.30
  rho_update: 0.3         # usually keep at 0.3
  delta_new: 0.62         # practical range ~0.60–0.68
  delta_enrolled: 0.75    # practical range ~0.70–0.80
  max_speakers: 8         # session-level global speaker budget
  leakage_delta: 0.55     # practical range ~0.50–0.58
  # Continuity rescue is disabled. With max_gap: 0 these are effectively no-op.
  # Re-enabling them made wrong-speaker audio stick to the enrolled lane.
  enrolled_continuity_margin: 0.05
  enrolled_continuity_max_gap: 0
  # Onset auxiliary remap only affects the very start of short enrolled onsets.
  # It can help clipped first syllables, but it will not fix missing middles.
  onset_aux_max_voiced_sec: 1.5
  onset_aux_dominance_ratio: 1.25
  onset_aux_dist_margin: 0.08

denoiser:
  enabled: false             # mic → buffer: can shift embeddings vs enrollment; keep off unless you re-enroll
  # Output DF can chew up separated speech interiors and cause block-wise pumping/choppy syllables; keep off unless you are explicitly A/B testing it.
  enhance_enrolled_output: false
  model: DeepFilterNet3      # model variant (DeepFilterNet, DeepFilterNet2, DeepFilterNet3)

server:
  host: 0.0.0.0
  port: 8042
