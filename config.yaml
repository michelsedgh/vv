# ─── Voice ID: Real-Time Diarization & Separation ─────────────────
#
debug:
  # Optional STEP_PERF line (log.info) every 6 steps or when infer_ms > 300 ms.
  step_perf_log: true
  step_perf_every_step: true
  step_perf_spike_threshold_ms: 340.0
  step_perf_reset_on_init: true
  step_perf_ndjson: logs/infer_step_perf.ndjson
  capture_live_session: true
  live_capture_dir: logs/live_sessions
# Stack: [optional mic DF] → PixIT (5 s chunk, 0.5 s step) → WeSpeaker on
# mixed waveform + segmentation weights → EnrolledSpeakerClustering →
# global separated-source reconstruction → delayed per-speaker output slice
# → [optional DF on output].
#
# Smooth playback / fewer spectrogram holes (tune in this order):
#   • audio.output_latency_sec — must be > step if you want the emitted slice to
#     be covered by more than one PixIT window. 1.0 s is the minimum useful
#     value here; 0.5 s falls back to the unstable newest edge again.
#   • clustering.tau_active — lower ⇒ more “active” locals ⇒ fewer empty maps;
#     too low adds noise; ~0.28 was a good tradeoff vs 0.4.
#   • clustering.holdover_* — keep enrolled audio on last PixIT channel when
#     seg flickers below tau but tail energy remains (pipeline holdover block).
#   • denoiser.enhance_enrolled_output — default false; true can add 500 ms
#     block pumping on separated playback.
#   • pixit.aggregation_latency_sec — Hamming fusion of diarization frames for
#     activity smoothing (not waveform OA); must be >= step.
#
# Implementation details and log-backed root-cause notes: pipeline.py module
# docstring; clustering behavior: enrolled_clustering.py module docstring.

audio:
  device_index: 0          # sounddevice input device (IC800 USB mic)
  sample_rate: 16000       # PixIT native sample rate
  # Emit audio with the same 2.0 s latency used by diarization aggregation so
  # every speaker packet is built from multiple overlapping PixIT windows.
  output_latency_sec: 2.0

device: cuda               # torch device

enrollment:
  dir: enrolled_speakers   # each sub-dir has embedding.npy + reference.wav
  record_seconds: 10       # default recording duration for enrollment
  # Distance / room: enrollment saves reference.wav; on server start the pipeline
  # re-extracts your centroid via PixIT→WeSpeaker (same path as live). If you enroll
  # nose-to-mic but use the app from across the room, separated audio and embeddings
  # differ (level, reverb, separation leakage) → lower "ID %" on the dashboard while
  # "diar %" still tracks how loud PixIT marks the slot. Fix: re-enroll at your usual
  # seating distance (or mid-room), speak naturally for ~10s, restart the server.
  # Optional: record a second take from another position and we can add multi-anchor
  # enrollment later; for now one good far-field reference beats one near-field clip.

pixit:
  model: pyannote/separation-ami-1.0
  duration: 5.0            # chunk duration in seconds (model trained on 5s)
  step: 0.5                # step between chunks in seconds
  max_speakers: 3          # PixIT max output sources per chunk
  # DIART-style Hamming aggregation of permuted diarization (see diart SpeakerDiarization.pred_aggregation).
  # Must be >= step. 2.0 s ≈ four 0.5 s windows — smoother activity; set equal to step to disable.
  aggregation_latency_sec: 2.0

embedding:
  model: pyannote/wespeaker-voxceleb-resnet34-LM
  # PixIT already outputs separated speaker channels. We embed those full-length
  # channels only for final audio extraction. Identity uses diart's official
  # mixed-waveform + segmentation-weight path, but only on a fixed recent window
  # so stale silence in the 5 s buffer does not dominate onset verification.
  source_seg_threshold: 0.14
  source_min_voiced_sec: 0.10
  source_recent_sec: 2.0
  enrollment_profile_top_k: 3  # average top weighted enrollment embeddings for a more stable frozen profile
  gamma: 3.0
  beta: 10.0

clustering:
  # Quiet / far-field: if the right person is rejected, check dashboard "ID %" (WeSpeaker).
  # If ID stays high but audio drops, tune tau_active / holdover. If ID drops, loosen
  # delta_enrolled slightly (e.g. 0.75) or re-enroll from typical distance — not both blindly.
  tau_active: 0.28         # below 0.4: fewer empty maps + less holdover-only steps (smoother diarization path)
  rho_update: 0.3          # slightly lower so speaker tracking updates on less sustained speech
  delta_new: 0.62          # slightly looser so one real unknown speaker doesn't fragment into many lanes
  delta_enrolled: 0.70     # enrolled match threshold (mich=0.24, others>0.69; safe margin)
  enrolled_session_alpha: 0.15  # adapt a session-local enrolled centroid slowly after confident matches; frozen enrollment stays untouched
  max_speakers: 8          # max global speakers tracked across session
  max_drift: 0.0           # unused (enrolled centroids are frozen)
  enrolled_grace_margin: 0.05   # grace only for the previously matched local channel
  leakage_delta: 0.55           # secondary local channels near an enrolled anchor are treated as leakage, not Unknown-*
  new_center_grace_margin: 0.05 # avoid spawning a new speaker only when the same local just flickered
  enrolled_preference_margin: 0.03  # if enrolled is nearly as close as unknown, prefer the frozen enrolled anchor
  unknown_reuse_delta: 0.74     # reuse an existing unknown lane before spawning another one
  unknown_min_voiced_sec: 0.35  # don't create a new unknown speaker from a tiny onset fragment
  unknown_min_tail_rms: 0.01    # don't keep/spawn Unknown-* from stale context when the current separated tail is effectively silent
  reentry_max_steps: 8          # after a short silence gap, allow the last enrolled local channel to reclaim the speaker on the first onset
  reentry_min_voiced_sec: 0.05   # let the last enrolled speaker reclaim the first post-silence packet instead of waiting for a long voiced window
  reentry_tail_rms: 0.02
  reentry_dominance_ratio: 3.0
  unknown_output_min_activity: 0.05  # low-confidence Unknown-* flicker is dropped from output/UI
  unknown_output_min_tail_rms: 0.02  # drop Unknown-* if the current separated tail is essentially flat
  unknown_output_min_tail_ratio: 0.15  # also drop Unknown-* when its tail energy is tiny relative to the dominant local speaker
  # Keep continuity conservative: only rescue the last enrolled local channel when
  # segmentation and tail energy still both indicate speech, or when the current
  # embedding is still close to the enrolled anchor.
  holdover_seg_max: 0.12
  holdover_tail_rms: 0.002
  holdover_max_steps: 3

denoiser:
  enabled: false             # mic → buffer: can shift embeddings vs enrollment; keep off unless you re-enroll
  # Output DF caused strong block-wise pumping in logs (raw_rms swings); keep off unless you need denoised playback.
  enhance_enrolled_output: false
  model: DeepFilterNet3      # model variant (DeepFilterNet, DeepFilterNet2, DeepFilterNet3)

server:
  host: 0.0.0.0
  port: 8042
