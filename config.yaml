# MeanFlow-TSE live mic dashboard

audio:
  device_index: 0
  sample_rate: 16000  # must match MeanFlow training (16 kHz)

device: cuda

enrollment:
  dir: enrolled_speakers
  # Mic capture length (seconds). Should be >= meanflow.enroll_seconds. 3 matches LibriMix segment_aux.
  record_seconds: 3
  # Folder name under enrolled_speakers (e.g. michel). If null, use newest reference.wav.
  active_speaker: null

# Used by legacy enroll_speaker.py / stream_monitor.py
verification:
  enrollment_dir: enrolled_speakers

meanflow:
  # Path to MeanFlow-TSE yaml (inside cloned repo). Use *_noisy.yaml with noisy Drive weights.
  base_config: meanflow_tse/config/config_MeanFlowTSE_noisy.yaml
  # Main checkpoint (gdown: see models/meanflow/download_weights.sh)
  checkpoint: models/meanflow/best-noisy-weights.ckpt
  # ECAPA t-predictor (Lightning ckpt); alpha before Euler, same as eval_steps --t_predicter ECAPAMLP
  use_t_predictor: true
  t_predictor_checkpoint: models/meanflow/t-predictor-noisy-weights.ckpt

  # ── Streaming / latency settings ──────────────────────────────────
  # The model ALWAYS processes dataset.segment-sized tiles (3s from base_config).
  # hop_seconds controls how often we produce output: a SLIDING WINDOW advances
  # by hop_seconds each step while always feeding the model a full 3s window.
  #
  # Latency ≈ hop_seconds + GPU inference time  (steady-state, after initial 3s fill).
  # Shorter hop = lower latency but more GPU load (each second costs one full model forward).
  #
  #   hop_seconds=3.0  → original non-overlapping behaviour, ~3s latency
  #   hop_seconds=1.0  → 1s output every ~1.1-1.3s, ~1.1s latency  (recommended)
  #   hop_seconds=0.5  → 0.5s output, ~0.6s latency, 2× GPU load vs 1.0s hop
  hop_seconds: 1.0

  # Crossfade between consecutive output chunks to eliminate boundary clicks.
  # 10-20 ms is inaudible but smooths any discontinuity. 0 = no crossfade.
  crossfade_seconds: 0.01

  # Smaller = less buffered audio when GPU falls behind (snappier, but easier dropouts if infer is slow).
  max_queued_chunks: 4
  # Optional minimum seconds between GPU runs (0 = run as fast as FIFO has a full chunk).
  min_inference_interval_seconds: 0
  euler_steps: 1
  # Reference length for STFT + t-predictor (seconds); must match dataset segment_aux (3) in yaml
  enroll_seconds: 3

  # ── Performance optimizations ─────────────────────────────────────
  # torch.autocast FP16: ~1.5-2× faster on modern GPUs, negligible quality loss.
  use_fp16: true
  # torch.compile with CUDA graphs: ~2-3× faster after first warmup call.
  # First inference is slow (compilation); disable if it causes issues.
  use_torch_compile: true

server:
  host: 0.0.0.0
  port: 8042
