# MeanFlow-TSE live mic dashboard

audio:
  device_index: 0
  sample_rate: 16000  # must match MeanFlow training (16 kHz)

device: cuda

enrollment:
  dir: enrolled_speakers
  # Mic capture length (seconds). Should be >= meanflow.enroll_seconds. 3 matches LibriMix segment_aux.
  record_seconds: 3
  # Folder name under enrolled_speakers (e.g. michel). If null, use newest reference.wav.
  active_speaker: null

# Used by legacy enroll_speaker.py / stream_monitor.py
verification:
  enrollment_dir: enrolled_speakers

meanflow:
  # Path to MeanFlow-TSE yaml (inside cloned repo). Use *_noisy.yaml with noisy Drive weights.
  base_config: meanflow_tse/config/config_MeanFlowTSE_noisy.yaml
  # Main checkpoint (gdown: see models/meanflow/download_weights.sh)
  checkpoint: models/meanflow/best-noisy-weights.ckpt
  # ECAPA t-predictor (Lightning ckpt); alpha before Euler, same as eval_steps --t_predicter ECAPAMLP
  use_t_predictor: true
  t_predictor_checkpoint: models/meanflow/t-predictor-noisy-weights.ckpt
  # Live latency ≈ chunk_seconds + GPU time (FIFO). Shorter = snappier; STFT still pads to dataset.segment (3s)
  # inside the model (see mftse_infer), so 1–2s chunks work without breaking the UDiT time layout.
  chunk_seconds: 1
  # Smaller = less buffered audio when GPU falls behind (snappier, but easier dropouts if infer is slow).
  max_queued_chunks: 4
  # Optional minimum seconds between GPU runs (0 = run as fast as FIFO has a full chunk).
  min_inference_interval_seconds: 0
  euler_steps: 1
  # Reference length for STFT + t-predictor (seconds); must match dataset segment_aux (3) in yaml
  enroll_seconds: 3

server:
  host: 0.0.0.0
  port: 8042
